<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[WLF] Client Onboarding — Wilshire</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f8; color: #1a1a18; min-height: 100vh; }
    a { color: #185FA5; text-decoration: none; }
    a:hover { text-decoration: underline; }
    button { font-family: inherit; cursor: pointer; border-radius: 6px; transition: background .15s; }
    button:hover { opacity: .85; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #f0ede8; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const INITIAL_ISSUES = [
      { key: "SPS-68",  summary: "Phase 1 — Kickoff",                             status: "Done",        assignee: "Tom Soler", updated: "2026-05-11" },
      { key: "SPS-69",  summary: "Phase 2 — Discovery",                           status: "Done",        assignee: "Tom Soler", updated: "2026-05-11" },
      { key: "SPS-70",  summary: "Phase 3 — Data Migration",                      status: "In Progress", assignee: "Tom Soler", updated: "2026-05-20" },
      { key: "SPS-71",  summary: "Phase 4 — Solution Design",                     status: "In Progress", assignee: "Tom Soler", updated: "2026-05-20" },
      { key: "SPS-72",  summary: "Phase 5 — Custom Build & Configuration (L1)",   status: "In Progress", assignee: "Tom Soler", updated: "2026-05-20" },
      { key: "SPS-205", summary: "Phase 5b — Custom Build & Configuration (L2)",  status: "To Do",       assignee: "Tom Soler", updated: "2026-05-20" },
      { key: "SPS-206", summary: "Phase 5c — Custom Build & Configuration (L3)",  status: "To Do",       assignee: "Tom Soler", updated: "2026-05-20" },
      { key: "SPS-73",  summary: "Phase 6 — User Acceptance Testing (L1)",        status: "To Do",       assignee: "Tom Soler", updated: "2026-05-13" },
      { key: "SPS-74",  summary: "Phase 7 — Launch Preparation (L1)",             status: "To Do",       assignee: "Tom Soler", updated: "2026-05-20" },
      { key: "SPS-75",  summary: "Phase 8 — Launch (L1)",                         status: "To Do",       assignee: "Tom Soler", updated: "2026-05-20" },
      { key: "SPS-76",  summary: "Phase 9 — Hypercare (L1)",                      status: "To Do",       assignee: "Tom Soler", updated: "2026-05-20" },
      { key: "SPS-147", summary: "Phase 10 — UAT (L2)",                           status: "To Do",       assignee: "Tom Soler", updated: "2026-05-11" },
      { key: "SPS-151", summary: "Phase 11 — Launch Preparation (L2)",            status: "To Do",       assignee: "Tom Soler", updated: "2026-05-13" },
      { key: "SPS-155", summary: "Phase 12 — Launch (L2)",                        status: "To Do",       assignee: "Tom Soler", updated: "2026-05-11" },
      { key: "SPS-159", summary: "Phase 13 — UAT (L3)",                           status: "To Do",       assignee: "Tom Soler", updated: "2026-05-13" },
      { key: "SPS-163", summary: "Phase 14 — Launch Preparation (L3)",            status: "To Do",       assignee: "Tom Soler", updated: "2026-05-11" },
      { key: "SPS-167", summary: "Phase 15 — Launch (L3)",                        status: "To Do",       assignee: "Tom Soler", updated: "2026-05-11" },
      { key: "SPS-171", summary: "Phase 16 — Hypercare (L2)",                     status: "To Do",       assignee: "Tom Soler", updated: "2026-05-13" },
      { key: "SPS-175", summary: "Phase 17 — Hypercare (L3)",                     status: "To Do",       assignee: "Tom Soler", updated: "2026-05-13" },
    ];

    const STATUSES = ["To Do", "In Progress", "Done"];

    const S = {
      "Done":        { bg: "#EAF3DE", text: "#27500A", dot: "#639922" },
      "In Progress": { bg: "#FAEEDA", text: "#633806", dot: "#BA7517" },
      "To Do":       { bg: "#E6F1FB", text: "#0C447C", dot: "#378ADD" },
    };

    function Badge({ status }) {
      const c = S[status] || { bg: "#F1EFE8", text: "#444441", dot: "#888780" };
      return (
        <span style={{ background: c.bg, color: c.text, fontSize: 11, fontWeight: 600, padding: "3px 10px", borderRadius: 99, display: "inline-flex", alignItems: "center", gap: 5, whiteSpace: "nowrap" }}>
          <span style={{ width: 6, height: 6, borderRadius: "50%", background: c.dot }} />
          {status}
        </span>
      );
    }

    function App() {
      const [issues, setIssues] = useState(INITIAL_ISSUES);
      const [filter, setFilter] = useState("All");
      const [editing, setEditing] = useState(null);
      const [toast, setToast] = useState(null);

      const counts = issues.reduce((a, i) => { a[i.status] = (a[i.status] || 0) + 1; return a; }, {});
      const done = counts["Done"] || 0;
      const inProg = counts["In Progress"] || 0;
      const donePct = Math.round((done / issues.length) * 100);
      const inProgPct = Math.round((inProg / issues.length) * 100);
      const filtered = filter === "All" ? issues : issues.filter(i => i.status === filter);

      function changeStatus(key, newStatus) {
        const today = new Date().toISOString().slice(0, 10);
        setIssues(prev => prev.map(i => i.key === key ? { ...i, status: newStatus, updated: today } : i));
        setEditing(null);
        setToast(`${key} updated to "${newStatus}"`);
        setTimeout(() => setToast(null), 3000);
      }

      return (
        <div style={{ maxWidth: 780, margin: "0 auto", padding: "2rem 1.25rem" }}>

          {/* Toast */}
          {toast && (
            <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "#27500A", color: "#fff", fontSize: 13, padding: "9px 20px", borderRadius: 99, zIndex: 999 }}>
              ✓ {toast}
            </div>
          )}

          {/* Header */}
          <div style={{ marginBottom: "1.75rem" }}>
            <div style={{ fontSize: 22, fontWeight: 600, marginBottom: 4 }}>[WLF] Client Onboarding</div>
            <div style={{ fontSize: 13, color: "#666", display: "flex", alignItems: "center", gap: 12 }}>
              <span>Wilshire · SPS-67 · {issues.length} phases</span>
              <a href="https://evenup.atlassian.net/browse/SPS-67" target="_blank" rel="noreferrer"
                style={{ fontSize: 12, display: "inline-flex", alignItems: "center", gap: 4 }}>
                Open in Jira ↗
              </a>
            </div>
          </div>

          {/* Metric cards */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 12, marginBottom: "1.5rem" }}>
            {[
              { label: "Total phases", value: issues.length },
              { label: "Done", value: done, sub: `${donePct}% complete` },
              { label: "In progress", value: inProg },
              { label: "To do", value: counts["To Do"] || 0 },
            ].map(c => (
              <div key={c.label} style={{ background: "#f1efe8", borderRadius: 8, padding: "12px 16px" }}>
                <div style={{ fontSize: 12, color: "#666", marginBottom: 4 }}>{c.label}</div>
                <div style={{ fontSize: 26, fontWeight: 600 }}>{c.value}</div>
                {c.sub && <div style={{ fontSize: 11, color: "#999", marginTop: 2 }}>{c.sub}</div>}
              </div>
            ))}
          </div>

          {/* Progress bar */}
          <div style={{ marginBottom: "1.5rem" }}>
            <div style={{ fontSize: 12, color: "#666", marginBottom: 6 }}>Overall progress</div>
            <div style={{ height: 8, borderRadius: 99, background: "#e8e6df", overflow: "hidden", display: "flex" }}>
              <div style={{ width: `${donePct}%`, background: "#639922", transition: "width .4s" }} />
              <div style={{ width: `${inProgPct}%`, background: "#BA7517", transition: "width .4s" }} />
            </div>
            <div style={{ display: "flex", gap: 16, marginTop: 6, fontSize: 11, color: "#888" }}>
              {[["#639922","Done",donePct],["#BA7517","In progress",inProgPct],["#378ADD","To do",100-donePct-inProgPct]].map(([col,lbl,pct]) => (
                <span key={lbl} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <span style={{ width: 8, height: 8, borderRadius: 2, background: col }} />{lbl} {pct}%
                </span>
              ))}
            </div>
          </div>

          {/* Filters */}
          <div style={{ display: "flex", gap: 8, marginBottom: "1rem", flexWrap: "wrap" }}>
            {["All", ...STATUSES].map(s => {
              const n = s === "All" ? issues.length : (counts[s] || 0);
              const active = filter === s;
              return (
                <button key={s} onClick={() => setFilter(s)}
                  style={{ fontSize: 12, padding: "5px 13px", background: active ? "#E6F1FB" : "#fff", color: active ? "#0C447C" : "#666", border: `1px solid ${active ? "#378ADD" : "#ddd"}`, fontWeight: active ? 600 : 400 }}>
                  {s} ({n})
                </button>
              );
            })}
          </div>

          {/* Table */}
          <div style={{ border: "1px solid #e8e6df", borderRadius: 10, overflow: "visible" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, tableLayout: "fixed" }}>
              <colgroup>
                <col style={{ width: 88 }} /><col /><col style={{ width: 160 }} /><col style={{ width: 96 }} />
              </colgroup>
              <thead>
                <tr style={{ background: "#f5f3ee", borderBottom: "1px solid #e8e6df" }}>
                  {["Key","Phase","Status","Updated"].map(h => (
                    <th key={h} style={{ padding: "8px 12px", textAlign: "left", fontWeight: 500, color: "#888", fontSize: 11 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((issue, i) => (
                  <tr key={issue.key} style={{ borderBottom: i < filtered.length - 1 ? "1px solid #f0ede8" : "none", background: "#fff" }}>
                    <td style={{ padding: "10px 12px" }}>
                      <a href={`https://evenup.atlassian.net/browse/${issue.key}`} target="_blank" rel="noreferrer"
                        style={{ color: "#185FA5", fontWeight: 500, fontSize: 12 }}>{issue.key}</a>
                    </td>
                    <td style={{ padding: "10px 12px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{issue.summary}</td>
                    <td style={{ padding: "10px 12px", position: "relative" }}>
                      {editing === issue.key ? (
                        <div style={{ position: "absolute", zIndex: 10, top: 4, left: 8, background: "#fff", border: "1px solid #ddd", borderRadius: 8, padding: 6, display: "flex", flexDirection: "column", gap: 3, minWidth: 130, boxShadow: "0 4px 12px rgba(0,0,0,.08)" }}>
                          {STATUSES.map(s => (
                            <button key={s} onClick={() => changeStatus(issue.key, s)}
                              style={{ textAlign: "left", padding: "5px 8px", fontSize: 12, background: issue.status === s ? "#f5f3ee" : "transparent", border: "none", borderRadius: 4, cursor: "pointer" }}>
                              <Badge status={s} />
                            </button>
                          ))}
                          <button onClick={() => setEditing(null)} style={{ fontSize: 11, color: "#aaa", padding: "3px 8px", border: "none", background: "transparent", textAlign: "left", cursor: "pointer" }}>Cancel</button>
                        </div>
                      ) : (
                        <button onClick={() => setEditing(issue.key)}
                          style={{ background: "none", border: "none", padding: 0, cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 4 }}>
                          <Badge status={issue.status} />
                          <span style={{ fontSize: 11, color: "#aaa" }}>▾</span>
                        </button>
                      )}
                    </td>
                    <td style={{ padding: "10px 12px", color: "#999", fontSize: 12 }}>{issue.updated}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div style={{ marginTop: 10, fontSize: 11, color: "#bbb", textAlign: "right" }}>
            Click any status badge to update · All phases assigned to Tom Soler
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
